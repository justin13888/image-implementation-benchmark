name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      - name: Cache vendor build artifacts
        uses: actions/cache@v4
        with:
          path: |
            vendor/install
            vendor/build/ssimulacra2
          key: vendor-${{ runner.os }}-${{ hashFiles('.gitmodules') }}-${{ hashFiles('.git/modules/**/HEAD') }}

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang ccache nasm meson ninja-build pkg-config

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Python dependencies
        run: uv sync

      - name: Run checks
        run: just check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Cache vendor build artifacts
        uses: actions/cache@v4
        with:
          path: |
            vendor/install
            vendor/build/ssimulacra2
          key: vendor-${{ runner.os }}-${{ hashFiles('.gitmodules') }}-${{ hashFiles('.git/modules/**/HEAD') }}

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang ccache nasm meson ninja-build pkg-config

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Python dependencies
        run: uv sync

      - name: Run tests
        run: just test
